name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun-version: [latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - run: bun install

      - name: Type check
        run: bunx --bun tsc --noEmit

      - name: Unit tests
        run: bun test test/unit

      - name: Security tests
        run: bun test test/security

      - name: Integration tests
        run: bun test test/integration

      - name: E2E tests
        run: bun test test/e2e

  ci-complete:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            exit 1
          fi
