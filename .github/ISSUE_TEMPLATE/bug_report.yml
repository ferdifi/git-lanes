name: Bug Report
description: Report a bug in git-lanes
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Duplicate Check
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Session Management
        - Conflict Detection
        - Test Runner
        - CLI
        - Hooks / Adapters
        - Configuration
        - Forge / PR Creation
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 14.2, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: "git-lanes 0.1.0, Bun 1.0.0, Git 2.40"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `git lanes start test`
        2. Edit a file
        3. Run `git lanes commit -m "test"`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      render: shell
