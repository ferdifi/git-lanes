name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Duplicate Check
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      placeholder: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: How should this feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: What other approaches did you consider?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Session Management
        - Conflict Detection
        - Test Runner
        - CLI
        - Hooks / Adapters
        - Configuration
        - Forge / PR Creation
        - Documentation
        - Other
    validations:
      required: true
